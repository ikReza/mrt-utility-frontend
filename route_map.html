<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Route Map Generator</title>
<style>
  :root{
    --bg:#070912;
    --ink:#f2f4ff;
    --line-a:#00f0ff;
    --line-b:#ff2e9a;
    --line-c:#ffcc33;
    --line-dark:#0a0f24;
    --done:#2bff88;
    --done-ring:#17c96c;
    --pending:#ff2e9a;
    --pending-ring:#c91f74;
    --paper:#0b0e1c;
    --tag-bg:#0d1126;
    --tag-border:rgba(0,240,255,0.28);
    --muted:#8a93bd;
    --grid:rgba(0,240,255,0.06);
    --struct:#4d5688;
  }
  *{box-sizing:border-box;}
  body{
    margin:0;
    font-family:'JetBrains Mono', 'Fira Code', 'Segoe UI', monospace;
    background:var(--bg);
    padding:24px;
  }
  #toolbar{
    max-width:1100px;
    margin:0 auto 16px auto;
    display:flex;
    gap:10px;
    align-items:center;
    flex-wrap:wrap;
  }
  #toolbar button{
    background:var(--tag-bg);
    color:var(--line-a);
    border:1px solid var(--tag-border);
    padding:9px 16px;
    border-radius:6px;
    font-size:13px;
    cursor:pointer;
    font-weight:600;
    letter-spacing:.02em;
  }
  #toolbar button:hover{ background:#141a36; }
  #toolbar .hint{
    font-size:12.5px;
    color:var(--muted);
  }
  #stage{
    max-width:1100px;
    margin:0 auto;
    background:var(--paper);
    border-radius:10px;
    box-shadow:0 0 0 1px rgba(0,240,255,0.12), 0 8px 40px rgba(0,240,255,0.08);
    padding:20px;
    overflow-x:auto;
  }
  svg text{ font-family:'JetBrains Mono', 'Fira Code', 'Segoe UI', monospace; }
  .st-label{ font-size:16px; font-weight:700; fill:var(--ink); font-family:'Segoe UI', sans-serif; }
  .st-id{ font-size:15px; font-weight:800; letter-spacing:1px; }
  .cp-label{ font-size:15px; font-weight:700; fill:var(--muted); letter-spacing:2px; }
  .title-label{ font-size:15px; font-weight:700; fill:var(--ink); }
  .shaft-label{ font-size:13px; font-weight:700; fill:var(--muted); letter-spacing:1px; }
  .legend-text{ font-size:12px; fill:var(--muted); }
  .corridor-label{ font-size:11px; fill:var(--muted); letter-spacing:2px; }
</style>
</head>
<body>

<div id="stage">
  <svg id="map" xmlns="http://www.w3.org/2000/svg"></svg>
</div>

<script>
/* ============================================================
   EDIT ONLY THIS SECTION TO REUSE THE TEMPLATE FOR A NEW MAP
   ============================================================ */

const ROUTE_TITLE  = "AIRPORT ROUTE";
const ROUTE_LENGTH = "15k531m000";   // shown under the title, vertical axis label

// List stations TOP -> BOTTOM exactly as they should appear on the map.
// cp        : contract package group name (stations with the same cp get bracketed together)
// completed : true -> green check mark,  false -> plain black dot
const DATA = [
  { id:"S12", name:"Airport sta.",              cp:"CP06", completed:true  },
  { id:"S11", name:"Airport Terminal-3 sta.",    cp:"CP06", completed:true  },
  { id:"S10", name:"Khilkhet sta.",              cp:"CP06", completed:true  },
  { id:"S09", name:"Nadda sta.",                 cp:"CP05", completed:false },
  { id:"S08", name:"Natun Bazar sta.",           cp:"CP04", completed:false },
  { id:"S07", name:"North Badda sta.",           cp:"CP04", completed:false },
  { id:"S06", name:"Badda sta.",                 cp:"CP04", completed:false },
  { id:"S05", name:"Aftab Nagar sta.",           cp:"CP04", completed:false },
  { id:"S04", name:"Rampura sta.",               cp:"CP03", completed:false },
  { id:"S03", name:"Malibagh sta.",              cp:"CP03", completed:false },
  { id:"S02", name:"Rajarbagh sta.",             cp:"CP03", completed:false },
  { id:"S01", name:"Kamlapur sta.",              cp:"CP03", completed:false },
];

// SHAPE_POINTS controls the bends of the route line, independent of the station list above.
// This is what real alignment drawings actually look like: straight tangent segments joined
// by a handful of bends — NOT a smooth wave through every station.
//   t      : fraction of the total vertical height, 0 = top shaft, 1 = bottom shaft
//   offset : sideways shift (px) of the line at that point, +right / -left of center
// These points were traced directly from the pixels of your reference photo (red-line
// color mask -> per-row centerline -> Douglas-Peucker simplification), not hand-guessed.
// Add, remove, or nudge these t/offset pairs to reshape the line for a different route.
const SHAPE_POINTS = [
  { t:0.0000, offset: -135.2 },
  { t:0.1372, offset:  -22.2 },
  { t:0.2200, offset:   10.0 },
  { t:0.2600, offset:   22.0 },
  { t:0.3000, offset:   -5.0 },
  { t:0.5152, offset:   34.8 },
  { t:0.6442, offset:   36.2 },
  { t:0.7913, offset:  -65.8 },
  { t:0.8398, offset:  -83.8 },
  { t:0.9260, offset:   10.2 },
  { t:1.0000, offset:   25.8 },
];
const CORNER_RADIUS = 26; // how rounded each bend is, in px

const SHOW_LAUNCHING_SHAFTS = true;  // draws the hatched shaft bar above S12 and below S01

// --- animation add-ons ---
const ENABLE_LINE_GLOW    = true;   // soft glow behind the route line
const ENABLE_LINE_PULSE   = true;   // small bright dot that travels the whole route on a loop
const ENABLE_STATION_HALO = true;   // soft pulsing ring behind each station marker
const PULSE_DURATION_S    = 6;      // seconds for the dot to travel the full route
const HALO_DURATION_S     = 2.4;    // seconds per halo pulse cycle

/* ============================================================
   RENDER ENGINE — no need to edit below this line
   ============================================================ */

const ROW_H      = 78;     // vertical space per station
const TOP_PAD    = 90;     // space above the first station for the shaft
const BOTTOM_PAD = 90;     // space below the last station for the shaft
const LEFT_AXIS_X   = 60;   // overall route bracket
const CP_AXIS_X     = 130;  // per-CP bracket
const LABEL_X        = 195; // left edge of station name tags
const LINE_X          = 620; // x position of the vertical route line
const WIDTH            = 900;

const n = DATA.length;
const H = TOP_PAD + (n-1)*ROW_H + BOTTOM_PAD;

function yOf(i){ return TOP_PAD + i*ROW_H; }

// group consecutive stations sharing the same cp value
function groupByCP(data){
  const groups = [];
  let cur = null;
  data.forEach((d,i)=>{
    if(!cur || cur.cp !== d.cp){
      cur = { cp:d.cp, start:i, end:i };
      groups.push(cur);
    } else {
      cur.end = i;
    }
  });
  return groups;
}

// Convert SHAPE_POINTS (t-fractions) into actual pixel vertices for the given y-range.
function shapeVertices(topY, botY){
  return SHAPE_POINTS.map(p => ({
    x: LINE_X + p.offset,
    y: topY + p.t * (botY - topY)
  }));
}

// Build straight tangent segments joined by rounded corners (real alignment-drawing style),
// instead of a continuous wave through every point.
function roundedPolylinePath(points, radius){
  if(points.length < 2) return "";
  const dist = (a,b)=>Math.hypot(b.x-a.x, b.y-a.y);
  const along = (from,to,d)=>{
    const len = dist(from,to);
    if(len===0) return {x:from.x,y:from.y};
    return { x: from.x + (to.x-from.x)/len*d, y: from.y + (to.y-from.y)/len*d };
  };
  let d = `M ${points[0].x} ${points[0].y} `;
  for(let i=1;i<points.length-1;i++){
    const p0=points[i-1], p1=points[i], p2=points[i+1];
    const r1 = Math.min(radius, dist(p0,p1)/2);
    const r2 = Math.min(radius, dist(p1,p2)/2);
    const a = along(p1,p0,r1);
    const b = along(p1,p2,r2);
    d += `L ${a.x} ${a.y} Q ${p1.x} ${p1.y} ${b.x} ${b.y} `;
  }
  const last = points[points.length-1];
  d += `L ${last.x} ${last.y}`;
  return d;
}

// Find where the line sits (x) at a given y, by linear interpolation between shape vertices.
// Used to snap each station marker exactly onto the route line.
function xAtY(vertices, y){
  for(let i=0;i<vertices.length-1;i++){
    const a = vertices[i], b = vertices[i+1];
    if(y >= a.y && y <= b.y){
      const f = (b.y - a.y) === 0 ? 0 : (y - a.y)/(b.y - a.y);
      return a.x + (b.x - a.x)*f;
    }
  }
  return vertices[vertices.length-1].x;
}

function svgEl(tag, attrs, children){
  let s = `<${tag} `;
  for(const k in attrs) s += `${k}="${attrs[k]}" `;
  s += children!==undefined ? `>${children}</${tag}>` : `/>`;
  return s;
}

function buildBracket(x, y1, y2, label, opts={}){
  const arrow = 7;
  const labelX = x - 12;
  const c = "var(--struct)";
  let out = "";
  // vertical spine
  out += svgEl("line", {x1:x,y1:y1,x2:x,y2:y2,stroke:c,"stroke-width":1.4});
  // top arrow
  out += svgEl("line", {x1:x-arrow,y1:y1+arrow,x2:x,y2:y1,stroke:c,"stroke-width":1.4});
  out += svgEl("line", {x1:x+arrow,y1:y1+arrow,x2:x,y2:y1,stroke:c,"stroke-width":1.4});
  // bottom arrow
  out += svgEl("line", {x1:x-arrow,y1:y2-arrow,x2:x,y2:y2,stroke:c,"stroke-width":1.4});
  out += svgEl("line", {x1:x+arrow,y1:y2-arrow,x2:x,y2:y2,stroke:c,"stroke-width":1.4});
  // end caps
  out += svgEl("line", {x1:x-10,y1:y1,x2:x+10,y2:y1,stroke:c,"stroke-width":1.4});
  out += svgEl("line", {x1:x-10,y1:y2,x2:x+10,y2:y2,stroke:c,"stroke-width":1.4});
  // rotated label centered on the bracket
  const midY = (y1+y2)/2;
  out += `<text class="cp-label" x="${labelX}" y="${midY}" text-anchor="middle" transform="rotate(-90 ${labelX} ${midY})">${label}</text>`;
  return out;
}

function render(){
  const cpGroups = groupByCP(DATA);

  let defs = `
    <defs>
      <marker id="hatch" markerWidth="8" markerHeight="8" patternUnits="userSpaceOnUse">
      </marker>
      <pattern id="shaftHatch" width="8" height="8" patternTransform="rotate(45)" patternUnits="userSpaceOnUse">
        <rect width="8" height="8" fill="#4d5688"/>
      </pattern>
      <linearGradient id="lineGrad" x1="0" y1="0" x2="0" y2="1">
        <stop offset="0%"  stop-color="#00f0ff"/>
        <stop offset="50%" stop-color="#ff2e9a"/>
        <stop offset="100%" stop-color="#ffcc33"/>
      </linearGradient>
      <filter id="lineGlow" x="-80%" y="-80%" width="260%" height="260%">
        <feGaussianBlur stdDeviation="4.5" result="b"/>
        <feMerge>
          <feMergeNode in="b"/>
          <feMergeNode in="SourceGraphic"/>
        </feMerge>
      </filter>
      <filter id="softGlow" x="-80%" y="-80%" width="260%" height="260%">
        <feGaussianBlur stdDeviation="2.5" result="b"/>
        <feMerge>
          <feMergeNode in="b"/>
          <feMergeNode in="SourceGraphic"/>
        </feMerge>
      </filter>
    </defs>`;

  let out = `<svg id="map" xmlns="http://www.w3.org/2000/svg" viewBox="0 0 ${WIDTH} ${H}" width="${WIDTH}" height="${H}" style="background:var(--bg);">`;
  out += defs;

  // faint background grid
  out += svgEl("rect", {x:0, y:0, width:WIDTH, height:H, fill:"var(--paper)"});
  const gridRows = 16;
  for(let i=0;i<=gridRows;i++){
    const gy = (H/gridRows)*i;
    out += svgEl("line", {x1:0, x2:WIDTH, y1:gy, y2:gy, stroke:"var(--grid)", "stroke-width":1});
  }
  out += `<text class="corridor-label" x="${WIDTH-30}" y="24" text-anchor="end">↑ START</text>`;
  out += `<text class="corridor-label" x="${WIDTH-30}" y="${H-14}" text-anchor="end">END ↓</text>`;

  // overall route axis (far left)
  const topY = SHOW_LAUNCHING_SHAFTS ? TOP_PAD-40 : yOf(0)-20;
  const botY = SHOW_LAUNCHING_SHAFTS ? H-(BOTTOM_PAD-40) : yOf(n-1)+20;
  out += buildBracket(LEFT_AXIS_X, topY, botY, `${ROUTE_TITLE} (${ROUTE_LENGTH})`);

  // per-CP brackets
  cpGroups.forEach(g=>{
    const y1 = yOf(g.start) - ROW_H/2;
    const y2 = yOf(g.end) + ROW_H/2;
    out += buildBracket(CP_AXIS_X, y1, y2, g.cp);
  });

  // shared geometry for this render pass
  const topEndY = SHOW_LAUNCHING_SHAFTS ? TOP_PAD-40 : yOf(0)-20;
  const botEndY = SHOW_LAUNCHING_SHAFTS ? H-(BOTTOM_PAD-40) : yOf(n-1)+20;
  const vertices = shapeVertices(topEndY, botEndY);

  // launching shafts
  if(SHOW_LAUNCHING_SHAFTS){
    const shaftW = 46, shaftH = 10;
    const topX = xAtY(vertices, topEndY);
    const botX = xAtY(vertices, botEndY);
    // top
    out += svgEl("rect", {x:topX-shaftW/2, y:TOP_PAD-40-6, width:shaftW, height:shaftH, fill:"url(#shaftHatch)", stroke:"var(--struct)"});
    out += `<text class="shaft-label" x="${LABEL_X}" y="${TOP_PAD-40+2}">Launching Shaft</text>`;
    // bottom
    out += svgEl("rect", {x:botX-shaftW/2, y:H-(BOTTOM_PAD-40)-4, width:shaftW, height:shaftH, fill:"url(#shaftHatch)", stroke:"var(--struct)"});
    out += `<text class="shaft-label" x="${LABEL_X}" y="${H-(BOTTOM_PAD-40)+22}">Launching Shaft</text>`;
  }

  // the red route line — straight tangents joined by rounded bends, per SHAPE_POINTS
  const pathD = roundedPolylinePath(vertices, CORNER_RADIUS);
  const glowAttr = ENABLE_LINE_GLOW ? { filter:"url(#lineGlow)" } : {};
  out += svgEl("path", {d:pathD, fill:"none", stroke:"var(--line-dark)", "stroke-width":9, "stroke-linecap":"round", "stroke-linejoin":"round", ...glowAttr});
  out += svgEl("path", {d:pathD, fill:"none", stroke:"url(#lineGrad)", "stroke-width":7, "stroke-linecap":"round", "stroke-linejoin":"round"});

  // animated pulse dot that travels the full length of the route on a loop
  if(ENABLE_LINE_PULSE){
    out += `<circle r="6" fill="#fff" filter="url(#lineGlow)">
      <animateMotion dur="${PULSE_DURATION_S}s" repeatCount="indefinite" path="${pathD}"/>
      <animate attributeName="opacity" values="0.2;1;0.2" dur="1.5s" repeatCount="indefinite"/>
    </circle>`;
  }

  // stations
  DATA.forEach((d,i)=>{
    const y = yOf(i);
    const mx = xAtY(vertices, y);   // marker x position — snapped onto the route line

    // connector from label tag to the line
    out += svgEl("line", {x1:LABEL_X+ (d.name.length*7.5) + 14, y1:y, x2:mx-13, y2:y, stroke:"var(--struct)", "stroke-width":1, "stroke-dasharray":"2,3", opacity:0.5});

    // label tag
    const tagW = d.id.length*11 + d.name.length*8 + 34;
    out += svgEl("rect", {x:LABEL_X, y:y-16, width:tagW, height:30, rx:4, fill:"var(--tag-bg)", stroke:"var(--tag-border)"});
    out += `<text class="st-id" x="${LABEL_X+10}" y="${y+6}" fill="${d.completed ? 'var(--done)' : 'var(--pending)'}">${d.id}</text>`;
    out += `<text class="st-label" x="${LABEL_X+10+d.id.length*11+8}" y="${y+6}">${d.name}</text>`;

    // soft pulsing halo behind the marker
    if(ENABLE_STATION_HALO){
      const haloColor = d.completed ? "var(--done)" : "var(--pending)";
      out += `<circle cx="${mx}" cy="${y}" r="14" fill="${haloColor}" opacity="0.18">
        <animate attributeName="r" values="11;18;11" dur="${HALO_DURATION_S}s" repeatCount="indefinite"/>
        <animate attributeName="opacity" values="0.22;0.05;0.22" dur="${HALO_DURATION_S}s" repeatCount="indefinite"/>
      </circle>`;
    }

    // marker on the line
    if(d.completed){
      out += svgEl("circle", {cx:mx, cy:y, r:10, fill:"#070912", stroke:"var(--done)", "stroke-width":2.5, filter:"url(#softGlow)"});
      out += svgEl("circle", {cx:mx, cy:y, r:3, fill:"var(--done)"});
    } else {
      out += svgEl("circle", {cx:mx, cy:y, r:9, fill:"#070912", stroke:"var(--pending)", "stroke-width":2.5, filter:"url(#softGlow)"});
      out += svgEl("circle", {cx:mx, cy:y, r:3, fill:"var(--pending)"});
    }
  });

  // legend (top-right, below the START corridor label)
  const legY = 50;
  out += svgEl("circle", {cx:WIDTH-260, cy:legY-5, r:6, fill:"var(--done)", filter:"url(#softGlow)"});
  out += `<text class="legend-text" x="${WIDTH-245}" y="${legY}">Completed</text>`;
  out += svgEl("circle", {cx:WIDTH-140, cy:legY-5, r:6, fill:"var(--pending)", filter:"url(#softGlow)"});
  out += `<text class="legend-text" x="${WIDTH-125}" y="${legY}">Pending</text>`;

  out += `</svg>`;
  document.getElementById("stage").innerHTML = out;
}

render();
</script>
</body>
</html>
